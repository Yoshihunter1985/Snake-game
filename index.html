<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<title>Playback96 Snake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:1080px;height:1920px;
  overflow:hidden;
  background:#111;
  font-family:'Press Start 2P',monospace;
}
#root{
  position:relative;
  width:1080px;height:1920px;
  overflow:hidden;
}

#bg{
  position:absolute;inset:0;
  background-image:url('https://yoshihunter1985.github.io/Snake-game/background.jpg');
  background-size:cover;
  background-position:center;
  opacity:0.45;
  z-index:0;
}

/* Phone: original 500x539, displayed at scale x2.4 = 1200x1294px */
#phone-wrap{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:1200px;
  height:1294px;
  z-index:1;
}

/* Phone PNG sits on top — transparent bg + transparent screen hole */
#phone-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
  z-index:3;
  pointer-events:none;
}

/* Game screen behind phone, aligned to screen hole
   Hole at scale x2.4: left=413, top=358, width=372, height=266
   Expand 4px each side so bezel frames it neatly */
#screen-area{
  position:absolute;
  left:409px;
  top:354px;
  width:380px;
  height:274px;
  z-index:2;
  background:#8bac0f;
  overflow:hidden;
}

#score-hud{
  position:absolute;
  top:4px;left:6px;
  font-size:11px;
  color:#0f380f;
  z-index:10;
  pointer-events:none;
  white-space:nowrap;
}

canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:absolute;
  left:0;top:20px;
}

.screen-ov{
  position:absolute;inset:0;
  background:#8bac0f;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;z-index:20;padding:14px;
}
.screen-ov .logo-img{
  width:92%;display:block;
}
.pxt{
  font-family:'Press Start 2P',monospace;
  color:#0f380f;text-align:center;line-height:1.7;
}
.blink{animation:blink 0.9s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Key zones — pixel-picker coords x scale 2.4
   Each zone 110x85px centred on key centre               */
.key-zone{
  position:absolute;
  z-index:10;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  /* background:rgba(255,0,0,0.25);border:1px solid red; */
}

/* Row 1: 1(437,869)  2(598,895)  3(756,869) */
#k1{left:382px;top:827px;width:110px;height:85px;}
#k2{left:543px;top:853px;width:110px;height:85px;}
#k3{left:701px;top:827px;width:110px;height:85px;}

/* Row 2: 4(439,965)  5(595,979)  6(758,962) */
#k4{left:384px;top:923px;width:110px;height:85px;}
#k5{left:540px;top:937px;width:110px;height:85px;}
#k6{left:703px;top:920px;width:110px;height:85px;}

/* Row 3: 7(451,1054)  8(598,1073)  9(739,1051) */
#k7{left:396px;top:1012px;width:110px;height:85px;}
#k8{left:543px;top:1031px;width:110px;height:85px;}
#k9{left:684px;top:1009px;width:110px;height:85px;}

/* Row 4: *(454,1142)  0(598,1159)  #(742,1135) */
#ks{left:399px;top:1100px;width:110px;height:85px;}
#k0{left:543px;top:1117px;width:110px;height:85px;}
#kh{left:687px;top:1093px;width:110px;height:85px;}
</style>
</head>
<body>
<div id="root">
  <div id="bg"></div>
  <div id="phone-wrap">

    <div id="screen-area">
      <div id="score-hud">SCORE: <span id="sc">0</span></div>
      <canvas id="gc"></canvas>

      <div class="screen-ov" id="ss">
        <img class="logo-img"
             src="https://yoshihunter1985.github.io/Snake-game/logo_transparent%20(1).png"
             alt="Playback96">
        <div class="pxt" style="font-size:9px;">SNAKE</div>
        <div class="pxt blink" style="font-size:8px;">PRESS 5 TO START</div>
        <div class="pxt" style="font-size:7px;">2&#8593;&nbsp;4&#8592;&nbsp;6&#8594;&nbsp;8&#8595;</div>
      </div>

      <div class="screen-ov" id="gos" style="display:none;">
        <img class="logo-img"
             src="https://yoshihunter1985.github.io/Snake-game/logo_transparent%20(1).png"
             alt="Playback96">
        <div class="pxt" style="font-size:10px;">GAME OVER</div>
        <div class="pxt" id="fs" style="font-size:8px;"></div>
        <div class="pxt blink" style="font-size:7px;">PRESS 5 TO PLAY AGAIN</div>
      </div>
    </div>

    <!-- phone_processed.png: transparent bg + transparent screen hole -->
    <img id="phone-img"
         src="https://yoshihunter1985.github.io/Snake-game/phone_processed.png?v=2"
         alt="">

    <div class="key-zone" id="k1"></div>
    <div class="key-zone" id="k2"></div>
    <div class="key-zone" id="k3"></div>
    <div class="key-zone" id="k4"></div>
    <div class="key-zone" id="k5"></div>
    <div class="key-zone" id="k6"></div>
    <div class="key-zone" id="k7"></div>
    <div class="key-zone" id="k8"></div>
    <div class="key-zone" id="k9"></div>
    <div class="key-zone" id="ks"></div>
    <div class="key-zone" id="k0"></div>
    <div class="key-zone" id="kh"></div>
  </div>
</div>

<script>
(function(){
  const GH='https://yoshihunter1985.github.io/Snake-game/';
  function mkImg(n){const i=new Image();i.crossOrigin='anonymous';i.src=GH+n;return i;}

  const IMG_WALKMAN  = mkImg('Walkman.png');
  const IMG_CASSETTE = mkImg('cassette.png');

  const canvas=document.getElementById('gc');
  const ctx=canvas.getContext('2d');
  const ss=document.getElementById('ss');
  const gos=document.getElementById('gos');
  const scEl=document.getElementById('sc');
  const fsEl=document.getElementById('fs');

  // Screen area 380x(274-20)=380x254 for canvas
  const CELL=22;
  const COLS=Math.floor(380/CELL); // 17
  const ROWS=Math.floor(254/CELL); // 11
  canvas.width=COLS*CELL;   // 374
  canvas.height=ROWS*CELL;  // 242

  const TAIL_COLOURS=[
    '#1E90B3','#135B9E','#25408F','#932789',
    '#E23D96','#DA2128','#F26522','#EF9221','#F5D010'
  ];

  let snake,dir,nextDir,food,score,running,loopId;

  function init(){
    const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
    snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
    dir={x:1,y:0};nextDir={x:1,y:0};
    score=0;running=true;
    ss.style.display='none';gos.style.display='none';
    scEl.textContent='0';
    placeFood();
    clearInterval(loopId);
    loopId=setInterval(tick,150);
    draw();
  }

  function showGameOver(){
    running=false;clearInterval(loopId);
    fsEl.textContent='SCORE: '+score;
    gos.style.display='flex';
  }

  function pressStart(){if(running)return;init();}

  function placeFood(){
    let fx,fy,t=0;
    do{fx=Math.floor(Math.random()*COLS);fy=Math.floor(Math.random()*ROWS);t++;}
    while(t<500&&snake.some(s=>s.x===fx&&s.y===fy));
    food={x:fx,y:fy};
  }

  function tick(){
    if(!running)return;
    dir=nextDir;
    const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){showGameOver();return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;scEl.textContent=score;placeFood();}
    else snake.pop();
    draw();
  }

  function drawNote(cx,cy,size,col){
    const s=size*0.82;
    ctx.fillStyle=ctx.strokeStyle=col;
    ctx.lineWidth=s*0.13;
    const nw=s*0.38,nh=s*0.28,hx=cx-s*0.05,hy=cy+s*0.22;
    ctx.save();ctx.translate(hx,hy);ctx.rotate(-0.4);
    ctx.beginPath();ctx.ellipse(0,0,nw/2,nh/2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    const sx=hx+nw*0.38,st=cy-s*0.30;
    ctx.beginPath();ctx.moveTo(sx,hy-nh*0.1);ctx.lineTo(sx,st);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,st);
    ctx.bezierCurveTo(sx+s*0.28,st+s*0.04,sx+s*0.22,st+s*0.20,sx+s*0.05,st+s*0.30);
    ctx.stroke();
  }

  function draw(){
    ctx.fillStyle='#8bac0f';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=1;i<snake.length;i++){
      const s=snake[i],col=TAIL_COLOURS[(i-1)%TAIL_COLOURS.length];
      drawNote(s.x*CELL+CELL/2,s.y*CELL+CELL/2,CELL,col);
    }
    const hd=snake[0],hx=hd.x*CELL,hy=hd.y*CELL;
    if(IMG_WALKMAN.complete&&IMG_WALKMAN.naturalWidth>0)
      ctx.drawImage(IMG_WALKMAN,hx,hy,CELL,CELL);
    else{ctx.fillStyle=TAIL_COLOURS[0];ctx.fillRect(hx+1,hy+1,CELL-2,CELL-2);}
    const fx=food.x*CELL,fy=food.y*CELL;
    if(IMG_CASSETTE.complete&&IMG_CASSETTE.naturalWidth>0)
      ctx.drawImage(IMG_CASSETTE,fx,fy,CELL,CELL);
    else{ctx.fillStyle='#F5D010';ctx.fillRect(fx+2,fy+2,CELL-4,CELL-4);}
  }

  function setDir(dx,dy){
    if(!running)return;
    if(dx===-dir.x&&dy===-dir.y)return;
    nextDir={x:dx,y:dy};
  }

  document.addEventListener('keydown',e=>{
    const k=e.key;
    if(k==='5'||k==='Enter'||k===' '){e.preventDefault();pressStart();return;}
    if(k==='2'||k==='ArrowUp')    {e.preventDefault();setDir(0,-1);}
    if(k==='8'||k==='ArrowDown')  {e.preventDefault();setDir(0,1);}
    if(k==='4'||k==='ArrowLeft')  {e.preventDefault();setDir(-1,0);}
    if(k==='6'||k==='ArrowRight') {e.preventDefault();setDir(1,0);}
  });

  function bindKey(id,fn){
    const el=document.getElementById(id);if(!el)return;
    let touched=false;
    el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();touched=true;fn();},{passive:false});
    el.addEventListener('click',e=>{if(touched){touched=false;return;}fn();});
  }

  bindKey('k2',()=>setDir(0,-1));
  bindKey('k4',()=>setDir(-1,0));
  bindKey('k5',pressStart);
  bindKey('k6',()=>setDir(1,0));
  bindKey('k8',()=>setDir(0,1));

  IMG_WALKMAN.onload=()=>{if(running)draw();};
  IMG_CASSETTE.onload=()=>{if(running)draw();};

  ctx.fillStyle='#8bac0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);
})();
</script>
</body>
</html>
